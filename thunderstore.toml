[config]
schemaVersion = "1.0.3"

[package]
namespace = "Binbin"
name = "Hero_Tweaks"
versionNumber = "1.0.3"
description = "A mod that provides minor quality of life updates to nearly every hero, improving their less used enchantments, traits, and cards. Recommended to use alongside Starter Swaps"
websiteUrl = "https://github.com/binbinmods/HeroTweaks"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_AcrossTheObelisk = "5.4.23"
meds-Obeliskial_Content="1.7.3"


[build]
icon = "./icon.png"
readme = "./README.md"
outdir = "./build"

[[build.copy]]
source = "./HeroTweaks"
target = ""


[publish]
repository = "https://thunderstore.io"
communities = [ "across-the-obelisk", ]
[publish.categories]
across-the-obelisk = [ "mods", ]


